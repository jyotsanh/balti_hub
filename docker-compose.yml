services:
  # ==============================
  # Redis Cache / Queue Service
  # ==============================
  redis:
    image: redis:7-alpine
    container_name: balti-redis-service
    ports:
      - "6370:6379"
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - redis_data:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
  
  # ==============================
  # MongoDB Database Service
  # ==============================
  mongodb:
    image: mongo:7
    container_name: baltihub-mongodb-service
    ports:
      - "27012:27017"
    environment:
      MONGO_INITDB_DATABASE: ${MONGO_DB:-balti-hub}
    volumes:
      - mongodb_data:/data/db
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ==============================
  # FastAPI Application Service
  # ==============================
  balti_hub:
    build:
        context: ./apps/backend/
        dockerfile: Dockerfile
    container_name: baltiHub-service
    ports:
      - "8050:8015"
    env_file:
      - ./.env.prod
    volumes:
      - blob_data:/app/temp_storage
    depends_on:
      redis:
        condition: service_healthy
      mongodb:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import socket; s=socket.create_connection(('localhost',8015),2); s.close()"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s

  # ==============================
  # Frontend (React SPA + Vite Preview)
  # ==============================
  frontend:
    build:
      context: ./apps/frontend/
      dockerfile: Dockerfile
      args:
        VITE_API_URL: ${VITE_API_URL:-http://localhost:8050/api/v1}
    container_name: baltiHub-frontend
    ports:
      - "4173:4173"
    depends_on:
      balti_hub:
        condition: service_healthy
    restart: unless-stopped

volumes:
    mongodb_data:
    redis_data:
    blob_data: